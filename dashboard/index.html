<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HousingChoice</title>
    <meta name="description" content="Tenant placement, text-first — the HousingChoice conversation hub." />

    <!-- PWA: manifest + theme. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1f6feb" />

    <!-- iOS install support (the founder is on iPhone): standalone web app +
         apple-touch-icon, since iOS Safari ignores the manifest's icons/display. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HousingChoice" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
